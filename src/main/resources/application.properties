spring.application.name=VendaSys

# Importa o arquivo .env
spring.config.import=optional:file:${user.dir}/.env[.properties]

# Perfil padr„o (pode ser dev ou prod)
spring.profiles.active=${SPRING_PROFILE:dev}

# ==================== DATABASE ====================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meubanco}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA ====================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true
# ==================== FLYWAY - MIGRATIONS ====================
# Desabilita criaÁ„o autom·tica do Hibernate
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration